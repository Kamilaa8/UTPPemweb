<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Kamila Putri Hasan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top mt-3">
        <div class="container justify-content-center">
            <div class="bg-dark p-2 rounded-pill shadow d-flex gap-2 align-items-center px-4" style="border: 1px solid #333;">
                <a class="nav-link-custom" href="index.html"><i class="fas fa-home"></i> <span>Home</span></a>
                <a class="nav-link-custom" href="about.html"><i class="fas fa-user"></i> <span>About</span></a>
                <a class="nav-link-custom" href="skills.html"><i class="fas fa-code"></i> <span>Skills</span></a>
                <a class="nav-link-custom" href="projects.html"><i class="fas fa-briefcase"></i> <span>Projects</span></a>
                <a class="nav-link-custom active" href="contact.html"><i class="fas fa-envelope"></i> <span>Contact</span></a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="display-3 fw-800 text-neon">Let's Connect</h1>
            <p class="text-desc-skill">Have any ideas to colaborate with me? Hit me up!</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="contact-wrapper">
                    <div class="contact-info-card bg-orange">
                        <h2 class="fw-800 text-white mb-4">Contact Info</h2>
                        <div class="info-item">
                            <i class="fas fa-envelope"></i>
                            <p>kamilaputrih@student.unila.ac.id</p>
                        </div>
                        <div class="info-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <p>Bandar Lampung, Indonesia</p>
                        </div>
                        <div class="social-links-large mt-4">
                            <a href="#"><i class="fab fa-instagram"></i></a>
                            <a href="#"><i class="fab fa-linkedin"></i></a>
                            <a href="#"><i class="fab fa-github"></i></a>
                        </div>
                    </div>

                    <div class="contact-form-card bg-dark-soft">
                        <form action="#">
                            <div class="mb-3">
                                <label class="form-label small fw-bold">NAMA LENGKAP</label>
                                <input type="text" class="form-control custom-input" placeholder="Masukkan nama lo...">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">EMAIL</label>
                                <input type="email" class="form-control custom-input" placeholder="email@contoh.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-bold">PESAN</label>
                                <textarea class="form-control custom-input" rows="4" placeholder="Tulis apa aja di sini..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-neon w-100 fw-800 py-3">KIRIM PESAN</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
